name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  FORCE_COLOR: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - uses: actions/checkout@v4

      - name: Build CLI
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -tags "static cli" -ldflags "-s -w -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VencordInstallerCli-linux

      - uses: actions/upload-artifact@v4
        with:
          name: VencordInstaller-linux
          path: VencordInstallerCli-linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - uses: actions/checkout@v4

      - name: Install deps
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install pkg-config sdl2

      - name: Build
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -v -tags static -ldflags "-s -w -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VencordInstaller

      - name: Bundle .app
        run: |
          mkdir -p VencordInstaller.app/Contents/MacOS VencordInstaller.app/Contents/Resources
          cp macos/Info.plist VencordInstaller.app/Contents/Info.plist
          mv VencordInstaller VencordInstaller.app/Contents/MacOS/VencordInstaller
          cp macos/icon.icns VencordInstaller.app/Contents/Resources/icon.icns
          zip -r VencordInstaller.MacOS.zip VencordInstaller.app

      - uses: actions/upload-artifact@v4
        with:
          name: VencordInstaller-macos
          path: VencordInstaller.MacOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true

      - name: Install deps
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2 mingw-w64-x86_64-go
          export GOROOT=/mingw64/lib/go GOPATH=/mingw64

      - name: Cache Go mod and build
        uses: actions/cache@v4
        with:
          path: |
            .go-mod
            .go-build
          key: ${{ runner.os }}-go-msys2-${{ hashFiles('**/go.sum') }}

      - name: Install go-winres
        shell: msys2 {0}
        run: |
          export GOROOT=/mingw64/lib/go GOPATH=/mingw64 GOMODCACHE="$GITHUB_WORKSPACE/.go-mod" GOCACHE="$GITHUB_WORKSPACE/.go-build"
          GOPROXY=https://proxy.golang.org,direct go install github.com/tc-hib/go-winres@v0.3.1

      - name: Build GUI
        shell: msys2 {0}
        run: |
          export GOROOT=/mingw64/lib/go GOPATH=/mingw64 GOMODCACHE="$GITHUB_WORKSPACE/.go-mod" GOCACHE="$GITHUB_WORKSPACE/.go-build"
          go-winres make --product-version "${{ github.ref_name }}"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags static \
            -ldflags "-s -w -H=windowsgui -extldflags=-static -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" \
            -o VencordInstaller.exe

      - name: Build CLI
        shell: msys2 {0}
        run: |
          export GOROOT=/mingw64/lib/go GOPATH=/mingw64 GOMODCACHE="$GITHUB_WORKSPACE/.go-mod" GOCACHE="$GITHUB_WORKSPACE/.go-build"
          CGO_ENABLED=0 GOOS=windows GOARCH=386 go build -v -tags "static cli" \
            -ldflags "-s -w -extldflags=-static -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" \
            -o VencordInstallerCli.exe

      - uses: actions/upload-artifact@v4
        with:
          name: VencordInstaller-windows
          path: |
            VencordInstaller.exe
            VencordInstallerCli.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VencordInstaller-linux
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: VencordInstaller-macos
          path: macos

      - uses: actions/download-artifact@v4
        with:
          name: VencordInstaller-windows
          path: windows

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: false
          body: "Auto-built installers for Orion Vencord"
          files: |
            linux/VencordInstallerCli-linux
            macos/VencordInstaller.MacOS.zip
            windows/VencordInstalle*.exe
